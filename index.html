<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>إدارة العمال + مهامي</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;direction:rtl;background:#f0f0f0;padding:10px;transition:.3s}
.dark{background:#1e1e1e;color:white}
.container{max-width:600px;margin:auto}
input,select,button{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none}
.worker,.todo{background:white;padding:10px;margin-top:10px;border-radius:10px}
.dark .worker,.dark .todo{background:#2c2c2c}
button{cursor:pointer}
.delete{background:red;color:white}
.edit{background:orange;color:white}
.export{background:green;color:white}
.toggle{background:black;color:white}
.nav{display:flex;gap:5px}
.summary{background:#ddd;padding:10px;border-radius:10px}
.dark .summary{background:#444}
</style>
</head>

<body>

<div class="container">

<div class="nav">
<button onclick="showWorkers()">👷 العمال</button>
<button onclick="showTodo()">📝 مهامي</button>
<button class="toggle" onclick="toggleDark()">🌙</button>
</div>

<!-- العمال -->
<div id="workersPage">

<h2>💼 إدارة العمال</h2>

<input type="text" id="name" placeholder="اسم العامل">

<select id="job" onchange="checkJob()">
<option value="نقاش">نقاش</option>
<option value="كهربائي">كهربائي</option>
<option value="سباك">سباك</option>
<option value="other">غيره</option>
</select>

<input type="text" id="customJob" placeholder="اكتب المهنة" style="display:none">

<input type="number" id="paid" placeholder="المدفوع">
<input type="number" id="remaining" placeholder="الباقي">

<button onclick="addWorker()">➕ إضافة</button>

<input type="text" id="search" placeholder="🔍 بحث..." oninput="displayWorkers()">

<div class="summary" id="summary"></div>

<button class="export" onclick="exportPDF()">📄 PDF</button>
<button class="export" onclick="exportImage()">🖼️ صورة</button>
<button class="export" onclick="shareWhatsApp()">📤 واتساب</button>

<div id="list"></div>

</div>

<!-- TODO -->
<div id="todoPage" style="display:none">
<h2>📝 مهامي</h2>
<input type="text" id="todoInput">
<button onclick="addTodo()">➕</button>
<div id="progress"></div>
<div id="todoList"></div>
</div>

</div>

<div id="exportBox" style="position:absolute;left:-9999px;width:300px;background:white;padding:15px"></div>

<script>

let workers = JSON.parse(localStorage.getItem("workers")) || [];
let todos = JSON.parse(localStorage.getItem("todos")) || [];

/* العمال */

function checkJob(){
customJob.style.display = job.value==="other"?"block":"none";
}

function saveWorkers(){
localStorage.setItem("workers",JSON.stringify(workers));
}

function addWorker(){

let nameVal=name.value.trim();
let jobVal=job.value==="other"?customJob.value.trim():job.value;

let paidVal=+paid.value||0;
let remainVal=+remaining.value||0;

if(!nameVal) return alert("اكتب اسم العامل");
if(!jobVal) return alert("اكتب المهنة");

workers.push({name:nameVal,job:jobVal,paid:paidVal,remaining:remainVal});

saveWorkers();
displayWorkers();

name.value="";
customJob.value="";
paid.value="";
remaining.value="";
job.value="نقاش";
customJob.style.display="none";
}

function displayWorkers(){

list.innerHTML="";
let searchVal=search.value.toLowerCase();

let totalPaid=0,totalRemain=0;

workers.forEach((w,i)=>{

if(!w.name.toLowerCase().includes(searchVal)) return;

totalPaid+=w.paid;
totalRemain+=w.remaining;

list.innerHTML+=`
<div class="worker">
<strong>${w.name}</strong> (${w.job})<br>
💸 المدفوع: ${w.paid}<br>
📌 الباقي: ${w.remaining}
<br>
<button class="edit" onclick="editWorker(${i})">✏️</button>
<button class="delete" onclick="deleteWorker(${i})">❌</button>
</div>`;
});

summary.innerHTML=`
💰 إجمالي المدفوع: ${totalPaid}<br>
📌 إجمالي الباقي: ${totalRemain}<br>
📊 الإجمالي: ${totalPaid+totalRemain}
`;
}

function deleteWorker(i){
if(confirm("متأكد؟")){
workers.splice(i,1);
saveWorkers();
displayWorkers();
}
}

function editWorker(i){
let w=workers[i];

name.value=w.name;
paid.value=w.paid;
remaining.value=w.remaining;

if(["نقاش","كهربائي","سباك"].includes(w.job)){
job.value=w.job;
customJob.style.display="none";
}else{
job.value="other";
customJob.style.display="block";
customJob.value=w.job;
}

workers.splice(i,1);
saveWorkers();
displayWorkers();
}

/* export */

// تجهيز بيانات عامل واحد فقط للتصدير
function prepareExport(){

    if(!lastWorker){
        alert("مفيش عامل للتصدير");
        return null;
    }

    let box = document.getElementById("exportBox");

    box.innerHTML = `
        <h3>${lastWorker.name}</h3>
        <p>المهنة: ${lastWorker.job}</p>
        <p>💸 المدفوع: ${lastWorker.paid} جنيه</p>
        <p>📌 الباقي: ${lastWorker.remaining} جنيه</p>
        <p>📊 الإجمالي: ${lastWorker.paid + lastWorker.remaining} جنيه</p>
    `;

    return box;
}


async function exportPDF(){
const { jsPDF }=window.jspdf;
let canvas=await html2canvas(prepareExport());
let img=canvas.toDataURL("image/png");

let pdf=new jsPDF();
pdf.addImage(img,"PNG",10,10,180,(canvas.height*180)/canvas.width);
pdf.save("account.pdf");
}

async function exportImage(){
let canvas=await html2canvas(prepareExport());
let img=canvas.toDataURL("image/png");

let a=document.createElement("a");
a.href=img;
a.download="account.png";
a.click();
}

function shareWhatsApp(){

let text="📊 الحساب:\n\n";

workers.forEach(w=>{
text+=`👷 ${w.name} (${w.job})
💸 المدفوع: ${w.paid}
📌 الباقي: ${w.remaining}

`;
});

window.open("https://wa.me/?text="+encodeURIComponent(text));
}

/* todo */

function addTodo(){
if(!todoInput.value.trim()) return;

todos.push({text:todoInput.value,done:false});
localStorage.setItem("todos",JSON.stringify(todos));
todoInput.value="";
showTodos();
}

function showTodos(){

todoList.innerHTML="";
let done=0;

todos.forEach((t,i)=>{

if(t.done) done++;

todoList.innerHTML+=`
<div class="todo">
<input type="checkbox" ${t.done?"checked":""}
onclick="toggleTodo(${i})">
${t.text}
<button onclick="deleteTodo(${i})">❌</button>
</div>`;
});

progress.innerHTML=`📊 ${todos.length?Math.round(done/todos.length*100):0}%`;
}

function toggleTodo(i){
todos[i].done=!todos[i].done;
localStorage.setItem("todos",JSON.stringify(todos));
showTodos();
}

function deleteTodo(i){
todos.splice(i,1);
localStorage.setItem("todos",JSON.stringify(todos));
showTodos();
}

/* nav */

function showWorkers(){
workersPage.style.display="block";
todoPage.style.display="none";
displayWorkers();
}

function showTodo(){
workersPage.style.display="none";
todoPage.style.display="block";
showTodos();
}

function toggleDark(){
document.body.classList.toggle("dark");
}

/* init */
displayWorkers();
showTodos();

</script>

</body>
</html>
