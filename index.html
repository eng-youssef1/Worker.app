<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>إدارة العمال + مهامي</title>

<style>
body { font-family: Arial; direction: rtl; background:#f0f0f0; padding:10px; transition:.3s;}
.dark { background:#1e1e1e; color:white;}
.container { max-width:600px; margin:auto;}
input, select, button {
    width:100%; padding:10px; margin:5px 0;
    border-radius:8px; border:none;
}
.worker, .todo {
    background:white; padding:10px; margin-top:10px;
    border-radius:10px;
}
.dark .worker, .dark .todo { background:#2c2c2c;}
button { cursor:pointer;}
.delete{background:red;color:white;}
.edit{background:orange;color:white;}
.toggle{background:black;color:white;}
.nav{display:flex; gap:5px;}
.priority-high{border-right:5px solid red;}
.priority-mid{border-right:5px solid orange;}
.priority-low{border-right:5px solid green;}
</style>
</head>

<body>

<div class="container">

<div class="nav">
<button onclick="showWorkers()">👷 العمال</button>
<button onclick="showTodo()">📝 مهامي</button>
<button class="toggle" onclick="toggleDark()">🌙</button>
</div>

<!-- ================= العمال ================= -->
<div id="workersPage">

<h2>💼 إدارة العمال</h2>

<input type="text" id="name" placeholder="اسم العامل">

<select id="job" onchange="checkJob()">
<option value="نقاش">نقاش</option>
<option value="كهربائي">كهربائي</option>
<option value="سباك">سباك</option>
<option value="other">غيره</option>
</select>

<input type="text" id="customJob" placeholder="اكتب المهنة" style="display:none;">

<input type="number" id="paid" placeholder="المدفوع">
<input type="number" id="remaining" placeholder="الباقي">

<button onclick="addWorker()">➕ إضافة</button>

<div id="list"></div>

</div>

<!-- ================= TODO ================= -->
<div id="todoPage" style="display:none">

<h2>📝 مهامي</h2>

<input type="text" id="todoInput" placeholder="اكتب المهمة...">
<input type="datetime-local" id="todoDate">

<select id="priority">
<option value="low">منخفض</option>
<option value="mid">متوسط</option>
<option value="high">عالي</option>
</select>

<button onclick="addTodo()">➕ إضافة</button>

<input type="text" id="searchTodo" placeholder="🔍 بحث..." oninput="showTodos()">

<select id="filter" onchange="showTodos()">
<option value="all">الكل</option>
<option value="done">تم</option>
<option value="not">لم يتم</option>
</select>

<div id="progress"></div>

<div id="todoList"></div>

</div>

</div>

<script>

/* ================= العمال ================= */
let workers = JSON.parse(localStorage.getItem("workers")) || [];

function checkJob(){
    let job = document.getElementById("job").value;
    document.getElementById("customJob").style.display =
        job === "other" ? "block" : "none";
}

function saveWorkers(){
localStorage.setItem("workers", JSON.stringify(workers));
}

function addWorker(){
let name = document.getElementById("name").value.trim();
let jobSelect = document.getElementById("job").value;
let customJob = document.getElementById("customJob").value.trim();

let job = jobSelect === "other" ? customJob : jobSelect;

let paid = +document.getElementById("paid").value || 0;
let remaining = +document.getElementById("remaining").value || 0;

if(!name) return alert("اكتب اسم العامل");
if(!job) return alert("اكتب المهنة");

workers.push({name,job,paid,remaining});

saveWorkers();
displayWorkers();

document.getElementById("name").value="";
document.getElementById("customJob").value="";
document.getElementById("paid").value="";
document.getElementById("remaining").value="";
document.getElementById("job").value="نقاش";
document.getElementById("customJob").style.display="none";
}

function displayWorkers(){
let list = document.getElementById("list");
list.innerHTML="";

workers.forEach((w,i)=>{
list.innerHTML+=`
<div class="worker">
<strong>${w.name}</strong> (${w.job})<br>
💸 ${w.paid} جنيه | 📌 ${w.remaining} جنيه<br>
<button class="edit" onclick="editWorker(${i})">✏️ تعديل</button>
<button class="delete" onclick="deleteWorker(${i})">❌ حذف</button>
</div>`;
});
}

function deleteWorker(i){
if(confirm("متأكد؟")){
workers.splice(i,1);
saveWorkers();
displayWorkers();
}
}

function editWorker(i){
let w = workers[i];

document.getElementById("name").value = w.name;
document.getElementById("paid").value = w.paid;
document.getElementById("remaining").value = w.remaining;

if(["نقاش","كهربائي","سباك"].includes(w.job)){
document.getElementById("job").value = w.job;
document.getElementById("customJob").style.display="none";
}else{
document.getElementById("job").value = "other";
document.getElementById("customJob").style.display="block";
document.getElementById("customJob").value = w.job;
}

deleteWorker(i);
}

/* ================= TODO ================= */
let todos = JSON.parse(localStorage.getItem("todos")) || [];

function saveTodos(){
localStorage.setItem("todos", JSON.stringify(todos));
}

function addTodo(){
let text = document.getElementById("todoInput").value.trim();
let date = document.getElementById("todoDate").value;
let priority = document.getElementById("priority").value;

if(!text) return;

todos.push({text,date,priority,done:false});

document.getElementById("todoInput").value="";
saveTodos();
showTodos();
}

function showTodos(){
let list = document.getElementById("todoList");
let search = document.getElementById("searchTodo").value.toLowerCase();
let filter = document.getElementById("filter").value;

list.innerHTML="";

let doneCount=0;

todos.forEach((t,i)=>{

if(!t.text.toLowerCase().includes(search)) return;
if(filter==="done" && !t.done) return;
if(filter==="not" && t.done) return;

if(t.done) doneCount++;

let cls = t.priority==="high"?"priority-high":
t.priority==="mid"?"priority-mid":"priority-low";

list.innerHTML+=`
<div class="todo ${cls}">
<input type="checkbox" ${t.done?"checked":""}
onclick="toggleTodo(${i})">

<span style="text-decoration:${t.done?'line-through':'none'}">
${t.text}
</span>

<br>📅 ${t.date || "بدون تاريخ"}

<button class="edit" onclick="editTodo(${i})">✏️</button>
<button class="delete" onclick="deleteTodo(${i})">❌</button>
</div>`;
});

let percent = todos.length ? Math.round((doneCount/todos.length)*100) : 0;

document.getElementById("progress").innerHTML =
`📊 نسبة الإنجاز: ${percent}%`;
}

function toggleTodo(i){
todos[i].done=!todos[i].done;
saveTodos();
showTodos();
}

function deleteTodo(i){
todos.splice(i,1);
saveTodos();
showTodos();
}

function editTodo(i){
let newText = prompt("تعديل المهمة:", todos[i].text);
if(newText){
todos[i].text=newText;
saveTodos();
showTodos();
}
}

/* ================= NAV ================= */
function showWorkers(){
document.getElementById("workersPage").style.display="block";
document.getElementById("todoPage").style.display="none";
}

function showTodo(){
document.getElementById("workersPage").style.display="none";
document.getElementById("todoPage").style.display="block";
showTodos();
}

/* ================= DARK ================= */
function toggleDark(){
document.body.classList.toggle("dark");
}

/* ================= INIT ================= */
displayWorkers();
showTodos();

</script>

</body>
</html>
