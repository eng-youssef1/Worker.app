<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>إدارة العمال</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: Arial;
    direction: rtl;
    background: #f0f0f0;
    padding: 10px;
    transition: 0.3s;
}
.dark {
    background: #1e1e1e;
    color: white;
}
.container {
    max-width: 600px;
    margin: auto;
}
input, select, button {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 8px;
    border: none;
}
.worker {
    background: white;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
}
.dark .worker {
    background: #2c2c2c;
}
button {
    cursor: pointer;
}
.delete { background: red; color: white; }
.edit { background: orange; color: white; }
.export { background: green; color: white; }
.toggle { background: black; color: white; }
.summary {
    background: #ddd;
    padding: 10px;
    border-radius: 10px;
}
.dark .summary {
    background: #444;
}
</style>
</head>

<body>

<div class="container">
    <h2>💼 إدارة العمال</h2>

    <input type="text" id="name" placeholder="اسم العامل">
    
    <select id="job" onchange="checkJob()">
        <option value="نقاش">نقاش</option>
        <option value="كهربائي">كهربائي</option>
        <option value="سباك">سباك</option>
        <option value="other">غيره</option>
    </select>

    <input type="text" id="customJob" placeholder="اكتب المهنة" style="display:none;">

    <input type="number" id="paid" placeholder="المدفوع">
    <input type="number" id="remaining" placeholder="الباقي">

    <button onclick="addWorker()">➕ إضافة</button>

    <input type="text" id="search" placeholder="🔍 بحث..." oninput="display()">

    <div class="summary" id="summary"></div>

    <button class="export" onclick="exportPDF()">📄 تصدير PDF</button>
    <button class="export" onclick="exportImage()">🖼️ حفظ كصورة</button>
    <button class="toggle" onclick="toggleDark()">🌙 Dark Mode</button>

    <div id="list"></div>
</div>

<!-- بوكس مخفي للتصدير -->
<div id="exportBox" style="position:absolute; left:-9999px; width:300px; background:white; padding:15px; border-radius:10px;"></div>

<script>
let workers = JSON.parse(localStorage.getItem("workers")) || [];
let editIndex = -1;
let lastWorker = null;

// inputs
const nameInput = document.getElementById("name");
const jobInput = document.getElementById("job");
const customJobInput = document.getElementById("customJob");
const paidInput = document.getElementById("paid");
const remainingInput = document.getElementById("remaining");

function checkJob(){
    customJobInput.style.display = jobInput.value === "other" ? "block" : "none";
}

function save() {
    localStorage.setItem("workers", JSON.stringify(workers));
}

function addWorker() {
    let name = nameInput.value.trim();
    let job = jobInput.value === "other" ? customJobInput.value.trim() : jobInput.value;
    let paid = +paidInput.value || 0;
    let remaining = +remainingInput.value || 0;

    if(name === "") return alert("اكتب اسم العامل");
    if(job === "") return alert("اكتب المهنة");

    let data = {name, job, paid, remaining};
    lastWorker = data;

    if(editIndex === -1){
        workers.push(data);
    } else {
        workers[editIndex] = data;
        editIndex = -1;
    }

    save();
    clearInputs();
    display();
}

function clearInputs(){
    nameInput.value = "";
    jobInput.value = "نقاش";
    customJobInput.value = "";
    customJobInput.style.display = "none";
    paidInput.value = "";
    remainingInput.value = "";
}

function deleteWorker(i){
    if(confirm("متأكد؟")){
        workers.splice(i,1);
        save();
        display();
    }
}

function editWorker(i){
    let w = workers[i];
    nameInput.value = w.name;
    paidInput.value = w.paid;
    remainingInput.value = w.remaining;

    if(["نقاش","كهربائي","سباك"].includes(w.job)){
        jobInput.value = w.job;
        customJobInput.style.display = "none";
    } else {
        jobInput.value = "other";
        customJobInput.style.display = "block";
        customJobInput.value = w.job;
    }

    lastWorker = w;
    editIndex = i;
}

function display(){
    let list = document.getElementById("list");
    let search = document.getElementById("search").value.toLowerCase();

    list.innerHTML = "";

    let totalPaid = 0;
    let totalRemaining = 0;

    workers.forEach((w,i)=>{
        if(!w.name.toLowerCase().includes(search)) return;

        totalPaid += w.paid;
        totalRemaining += w.remaining;

        list.innerHTML += `
        <div class="worker">
            <strong>${w.name}</strong> (${w.job})<br>
            💸 المدفوع: ${w.paid} جنيه<br>
            📌 الباقي: ${w.remaining} جنيه<br>
            📊 الإجمالي: ${w.paid + w.remaining} جنيه<br>
            <button class="edit" onclick="editWorker(${i})">✏️ تعديل</button>
            <button class="delete" onclick="deleteWorker(${i})">❌ حذف</button>
        </div>`;
    });

    summary.innerHTML = `
    💰 إجمالي المدفوع: ${totalPaid} جنيه <br>
    📌 إجمالي الباقي: ${totalRemaining} جنيه <br>
    📊 الكلي: ${totalPaid + totalRemaining} جنيه
    `;
}

// تجهيز بيانات العامل للتصدير
function prepareExport(){
    if(!lastWorker){
        alert("مفيش عامل للتصدير");
        return null;
    }

    let box = document.getElementById("exportBox");

    box.innerHTML = `
        <h3>${lastWorker.name}</h3>
        <p>المهنة: ${lastWorker.job}</p>
        <p>💸 المدفوع: ${lastWorker.paid} جنيه</p>
        <p>📌 الباقي: ${lastWorker.remaining} جنيه</p>
        <p>📊 الإجمالي: ${lastWorker.paid + lastWorker.remaining} جنيه</p>
    `;

    return box;
}

// PDF
async function exportPDF(){
    const { jsPDF } = window.jspdf;
    let element = prepareExport();
    if(!element) return;

    let canvas = await html2canvas(element);
    let img = canvas.toDataURL("image/png");

    let pdf = new jsPDF();
    pdf.addImage(img, "PNG", 10, 10, 180, (canvas.height*180)/canvas.width);
    pdf.save("worker.pdf");
}

// صورة
async function exportImage(){
    let element = prepareExport();
    if(!element) return;

    let canvas = await html2canvas(element);
    let img = canvas.toDataURL("image/png");

    let a = document.createElement("a");
    a.href = img;
    a.download = "worker.png";
    a.click();
}

function toggleDark(){
    document.body.classList.toggle("dark");
}

display();
</script>

</body>
</html>
