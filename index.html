<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>إدارة العمال + مهامي</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: Arial; direction: rtl; background:#f0f0f0; padding:10px; transition:.3s;}
.dark { background:#1e1e1e; color:white;}
.container { max-width:600px; margin:auto;}
input, select, button {
    width:100%; padding:10px; margin:5px 0;
    border-radius:8px; border:none;
}
.worker, .todo {
    background:white; padding:10px; margin-top:10px;
    border-radius:10px;
}
.dark .worker, .dark .todo { background:#2c2c2c;}
button { cursor:pointer;}
.delete{background:red;color:white;}
.edit{background:orange;color:white;}
.export{background:green;color:white;}
.toggle{background:black;color:white;}
.nav{display:flex; gap:5px;}
.summary{background:#ddd;padding:10px;border-radius:10px;}
.dark .summary{background:#444;}
.priority-high{border-right:5px solid red;}
.priority-mid{border-right:5px solid orange;}
.priority-low{border-right:5px solid green;}
</style>
</head>

<body>

<div class="container">

<div class="nav">
<button onclick="showWorkers()">👷 العمال</button>
<button onclick="showTodo()">📝 مهامي</button>
<button class="toggle" onclick="toggleDark()">🌙</button>
</div>

<!-- ================= العمال ================= -->
<div id="workersPage">

<h2>💼 إدارة العمال</h2>

<input type="text" id="name" placeholder="اسم العامل">

<select id="job" onchange="checkJob()">
<option value="نقاش">نقاش</option>
<option value="كهربائي">كهربائي</option>
<option value="سباك">سباك</option>
<option value="other">غيره</option>
</select>

<input type="text" id="customJob" placeholder="اكتب المهنة" style="display:none;">

<input type="number" id="paid" placeholder="المدفوع">
<input type="number" id="remaining" placeholder="الباقي">

<button onclick="addWorker()">➕ إضافة</button>

<input type="text" id="search" placeholder="🔍 بحث..." oninput="displayWorkers()">

<div class="summary" id="summary"></div>

<button class="export" onclick="exportPDF()">📄 PDF للحساب</button>
<button class="export" onclick="exportImage()">🖼️ صورة للحساب</button>
<button class="export" onclick="shareWhatsApp()">📤 واتساب</button>

<div id="list"></div>

</div>

<!-- ================= TODO ================= -->
<div id="todoPage" style="display:none">

<h2>📝 مهامي</h2>

<input type="text" id="todoInput" placeholder="اكتب المهمة...">
<input type="datetime-local" id="todoDate">

<select id="priority">
<option value="low">منخفض</option>
<option value="mid">متوسط</option>
<option value="high">عالي</option>
</select>

<button onclick="addTodo()">➕ إضافة</button>

<input type="text" id="searchTodo" placeholder="🔍 بحث..." oninput="showTodos()">

<select id="filter" onchange="showTodos()">
<option value="all">الكل</option>
<option value="done">تم</option>
<option value="not">لم يتم</option>
</select>

<div id="progress"></div>
<div id="todoList"></div>

</div>

</div>

<!-- بوكس مخفي -->
<div id="exportBox" style="position:absolute; left:-9999px; width:300px; background:white; padding:15px;"></div>

<script>

/* ================= العمال ================= */
let workers = JSON.parse(localStorage.getItem("workers")) || [];

function checkJob(){
document.getElementById("customJob").style.display =
document.getElementById("job").value==="other"?"block":"none";
}

function saveWorkers(){
localStorage.setItem("workers", JSON.stringify(workers));
}

function addWorker(){
let name = name.value.trim();
let jobSel = job.value;
let jobFinal = jobSel==="other"?customJob.value.trim():jobSel;
let paidVal = +paid.value||0;
let remVal = +remaining.value||0;

if(!name) return alert("اكتب اسم العامل");
if(!jobFinal) return alert("اكتب المهنة");

workers.push({name,job:jobFinal,paid:paidVal,remaining:remVal});

saveWorkers();
displayWorkers();

name.value="";customJob.value="";paid.value="";remaining.value="";
job.value="نقاش";customJob.style.display="none";
}

function displayWorkers(){
let list = document.getElementById("list");
let search = document.getElementById("search").value.toLowerCase();

list.innerHTML="";
let totalPaid=0,totalRem=0;

workers.forEach((w,i)=>{
if(!w.name.toLowerCase().includes(search)) return;

totalPaid+=w.paid;
totalRem+=w.remaining;

list.innerHTML+=`
<div class="worker">
<strong>${w.name}</strong> (${w.job})<br>
💸 ${w.paid} | 📌 ${w.remaining} | 📊 ${w.paid+w.remaining}
<button class="edit" onclick="editWorker(${i})">✏️</button>
<button class="delete" onclick="deleteWorker(${i})">❌</button>
</div>`;
});

summary.innerHTML=`
💰 ${totalPaid} جنيه <br>
📌 ${totalRem} جنيه <br>
📊 ${totalPaid+totalRem} جنيه
`;
}

function deleteWorker(i){
if(confirm("متأكد؟")){
workers.splice(i,1);
saveWorkers();
displayWorkers();
}
}

function editWorker(i){
let w=workers[i];
name.value=w.name;
paid.value=w.paid;
remaining.value=w.remaining;

if(["نقاش","كهربائي","سباك"].includes(w.job)){
job.value=w.job;customJob.style.display="none";
}else{
job.value="other";customJob.style.display="block";customJob.value=w.job;
}

workers.splice(i,1);
saveWorkers();
displayWorkers();
}

/* ================= تجهيز الحساب ================= */
function prepareExport(){
let box=document.getElementById("exportBox");

let totalPaid=0,totalRem=0;

let html="<h3>📊 الحساب الكامل</h3>";

workers.forEach(w=>{
totalPaid+=w.paid;
totalRem+=w.remaining;

html+=`
<p>${w.name} (${w.job})<br>
💸 ${w.paid} | 📌 ${w.remaining}</p>`;
});

html+=`
<hr>
<p>💰 الإجمالي المدفوع: ${totalPaid}</p>
<p>📌 الإجمالي الباقي: ${totalRem}</p>
<p>📊 الكلي: ${totalPaid+totalRem}</p>`;

box.innerHTML=html;

return box;
}

/* ================= PDF ================= */
async function exportPDF(){
const { jsPDF } = window.jspdf;
let el=prepareExport();
let canvas=await html2canvas(el);
let img=canvas.toDataURL("image/png");

let pdf=new jsPDF();
pdf.addImage(img,"PNG",10,10,180,(canvas.height*180)/canvas.width);
pdf.save("account.pdf");
}

/* ================= صورة ================= */
async function exportImage(){
let el=prepareExport();
let canvas=await html2canvas(el);
let img=canvas.toDataURL("image/png");

let a=document.createElement("a");
a.href=img;
a.download="account.png";
a.click();
}

/* ================= واتساب ================= */
async function shareWhatsApp(){
let text="📊 الحساب:\n";

workers.forEach(w=>{
text+=`${w.name} (${w.job}) - ${w.paid}/${w.remaining}\n`;
});

let url="https://wa.me/?text="+encodeURIComponent(text);
window.open(url,"_blank");
}

/* ================= TODO ================= */
let todos=JSON.parse(localStorage.getItem("todos"))||[];

function saveTodos(){localStorage.setItem("todos",JSON.stringify(todos));}

function addTodo(){
let t=todoInput.value.trim();
let d=todoDate.value;
let p=priority.value;
if(!t) return;

todos.push({text:t,date:d,priority:p,done:false});
todoInput.value="";
saveTodos();showTodos();
}

function showTodos(){
let list=todoList;
let done=0;

list.innerHTML="";
todos.forEach((t,i)=>{
if(t.done) done++;

list.innerHTML+=`
<div class="todo">
<input type="checkbox" ${t.done?"checked":""} onclick="toggleTodo(${i})">
${t.text}
<button onclick="deleteTodo(${i})">❌</button>
</div>`;
});

progress.innerHTML=`📊 ${todos.length?Math.round(done/todos.length*100):0}%`;
}

function toggleTodo(i){todos[i].done=!todos[i].done;saveTodos();showTodos();}
function deleteTodo(i){todos.splice(i,1);saveTodos();showTodos();}

/* ================= NAV ================= */
function showWorkers(){workersPage.style.display="block";todoPage.style.display="none";}
function showTodo(){workersPage.style.display="none";todoPage.style.display="block";showTodos();}

/* ================= DARK ================= */
function toggleDark(){document.body.classList.toggle("dark");}

displayWorkers();
showTodos();

</script>

</body>
</html>
